    <body>
       <header class="top-header">

    <div class="header-top">

        <a href="index.html" class="logo-box">
            <img src="https://png.pngtree.com/template/20190316/ourmid/pngtree-books-logo-image_79143.jpg" alt="logo">

         <nav class="navbar">

        </div>

</header>

      
        </header>

      
        <!--conntainerr-->
       <main class="container">
      <form id="supportForm" class="card">
            <h3> Unistore is allways here to serve you<br>
                solve buying,selling,technical problem.
            </h3> 
       
           
            <!--radio-->
            <div class="box">
                <p>I am: </p>
                <label><input type="radio" name="type" value="buyer"> Buyer/ Rent</label>
                <label><input type="radio" name="type" value="seller" checked> Seller/ Owner</label>

            </div>

            <!--inputs-->
            <label for="name">NAME</label>
            <input type="text" id="name">
            <span id="nameError"></span>
            <label for="email">EMAILE</label>
            <input type="email" id="email">
            <span id="emailError"></span>

            <div class="row">
                <div>
                    <!--ISSUE TYPE SELECT-->
                    <label>Issue Type</label>
                  <select id="issue">
                    <option value="">Select issue</option>
                    <option>Technical issue</option>
                    <option>product issue</option>
                    <option>Seller/Buyer issue</option>
                    <option>Delivery issue</option>
                  </select>
                  <span id="issueError"></span>
                </div>
                
                <div>
                   <input type="number" id="orderId" placeholder="order id ">
                   <span id="orderIdError"></span>
                </div>
            </div>
                <label>DESCRIPTION</label>
             <input type="text" id="desc" placeholder="ENTER YOUR PROBLEM">
             <span id="descError"></span>
             <button type="button" onclick="sendSupport()">Send</button>
       
       </form>
       </main>

          <script src="home.js"></script> 
          <script src="support.js"></script> 
    </body>
