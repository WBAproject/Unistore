<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>add new item</title>
         <link rel="stylesheet" href="stylehome.css">
        <link rel="stylesheet" href="add new item-page.css">

    </head>
 <!--logo,page name-->
    <body>


     <header class="top-header">
            <h2>ADD NEW ITEM</h2>
            <nav class="nav-links">
                <a href="index.html"  class="home-icon" title="home"></a>

         <div  class="header-top"  >
           <a href="index.html" class="logo-box">
              <img src="https://png.pngtree.com/template/20190316/ourmid/pngtree-books-logo-image_79143.jpg" alt="Unistore Logo">
               <h1>Unistore</h1>
            </a>

            <div class="right-side">

            <div class="menu-icon">
                      ☰
            </div>

            <div class="login-box">
              <a href="login.html" class="login-btn">login / sign Up</a>
            </div>
           </div>
     </header>

        <div class="overlay" id="overlay"></div>
        <div class="menu-side" id="menuside">
            <a href="login.html">Login / Sign Up</a>
            <a href="index.html">HOME</a>
            <a href="Browse Items.html">Browse Items</a>
            <a href="cart.html">Cart </a>
            <a href="add new item-page.html">Sell / Rent </a>
            <a href="support-page.html">Support </a>
            <a href="mailto:unistore@gmail.com">Contact Us | EMAIL </a>
       </div>


        <!--input ,client informtion-->
     <main> 
        <form id="itemform">
            <label>Enter item name</label>
            <input type="text"  id="itemName"  placeholder="enter your item name in one line">
            <span id="itemNameerror" class="error"></span>
            <label>description</label>
            <input type="text" id="description" placeholder="new,used,elsss.....">
            <span id="descriptionerror" class="error"></span>
            <label>Price </label> 
            <input type="number"  id="price"  placeholder="the expected price in SAR">
            <span id="priceerror" class="error"></span>
          <!--select-->
            <label>Category</label>
            <select id="category">
                <option value="">select Category</option>
                <option>Books</option>
                <option>Electronics</option>
                <option>Study Tools</option>
                <option>Notes/summary</option>
            </select>
            <span id="categoryerror" class="error"></span>
            <label>Contact Number</label>
            <div class="phone">
                <span class="flag">+966</span>
                <input type="tel" id="phone">
            </div>
            <span id="phoneerror" class="error"></span>
            <label>you want to</label>
            <div class="radio-group">
                <label><input type="radio" name="type"  value="Sell" checked >Sell item</label>
                <label><input type="radio" name="type" value="Rent">Rent item</label>
            </div>
            <input type="file"id="upload"hidden>
            <label for="upload" class="upload">Attach a photo for your item</label>
             
            <div class="checkbox">
                <label><input type="checkbox" id="saveInfo" checked > Save your information for next time</label>

            </div>
             <button type="button" class="publish" onclick="publishItem()">publish</button>
             <script src="home.js"></script>
             <script src="addnewitem.js"></script>
             <script src="Browse Items.js"></script>

        </form>
     </main>  

     <footer class="footer">
        <p> ©️ 2026 Unistore | All Rights Reserved </p>
        <a href="mailto:unistore@gmail.com"> Contact Us </a>
     </footer>
    </body>
</html>
