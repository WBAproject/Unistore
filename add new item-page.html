<div class="login-box" id="auth-container">
        <a href="login.html" id="login-btn" class="login-btn">login / sign Up</a>

    <div id="user-profile">
        <span>Welcome!</span>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJZ5Jv_tCYyoloVKtYTLbvqs_k_cKw-jJczg&s" alt="User Profile">

    </div>
 </div>

    </div>

</header>



        <!--input ,client informtion-->
     <main> 
        <form id="itemform">
            <label>Enter item name</label>
            <input type="text"  id="itemName"  placeholder="enter your item name in one line">
            <span id="itemNameerror" class="error"></span>
            <label>description</label>
            <input type="text" id="description" placeholder="new,used,elsss.....">
            <span id="descriptionerror" class="error"></span>
            <label>Price </label> 
            <input type="number"  id="price"  placeholder="the expected price in SAR">
            <span id="priceerror" class="error"></span>
          <!--select-->
            <label>Category</label>
            <select id="category">
                <option value="">select Category</option>
                <option>Books</option>
                <option>Electronics</option>
                <option>Study Tools</option>
                <option>Notes/summary</option>
            </select>
            <span id="categoryerror" class="error"></span>
            <label>Contact Number</label>
            <div class="phone">
                <span class="flag">+966</span>
                <input type="tel" id="phone">
            </div>
            <span id="phoneerror" class="error"></span>
            <label>you want to</label>
            <div class="radio-group">
                <label><input type="radio" name="type"  value="Sell" checked >Sell item</label>
                <label><input type="radio" name="type" value="Rent">Rent item</label>
            </div>
            <input type="file"id="upload"hidden>
            <label for="upload" class="upload">Attach a photo for your item</label>
             
            <div class="checkbox">
                <label><input type="checkbox" id="saveInfo" checked > Save your information for next time</label>

            </div>
             <button type="button" class="publish" onclick="publishItem()">publish</button>
             <script src="addnewitem.js"></script>
    
        </form>
     </main>
