<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="stylecart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="page-container">

        <!-- Header-->
         <header class="top-header">

            <div class="header-top" >
                <a href="index.html" class="logo-box">
                <img src="https://png.pngtree.com/template/20190316/ourmid/pngtree-books-logo-image_79143.jpg" alt="Unistore Logo">
                <h1>Unistore</h1>
            </a>

            <div class="right-side">

                <div class="menu-icon">
                    ☰
            </div>

            <div class="login-box">
                <a href="login.html" class="login-btn">login / sign Up</a>
        </div>
    </div>
</header>

         <div class="overlay"></div>

        <div class="menu-side" id="menuside">
            <a href="login.html">Login / Sign Up</a>
            <a href="index.html">HOME</a>
            <a href="Browse Items.html">Browse Items</a>
            <a href="cart.html">Cart</a>
            <a href="add new item-page.html">Sell / Rent </a>
            <a href="support-page.html">Support</a>
            <a href="mailto:unistore@gmail.com">Contact Us | EMAIL </a>
        </div>

         <!-- Shopping Cart-->
          <section class="cart-section">
            <h2>Shopping Cart</h2>
            <div class="cart-box" id="cartBox"></div>
          </section>  
   
                
          <!-- Order Summary -->

           <section class="summary-section">
            <h2>Order Summary</h2>

            <div class="summary-box">
                <div id="summaryItems"></div>

                <h3 id="totalPrice">Total: 0 SAR</h3>

                <div class="buy-btn-box">
                    <button class="buy-btn" id="openModal">
                       <i class="fa-solid fa-credit-card"></i> Buy Now
                    </button>
                </div>    
            </div>
           </section>
    </div>
    
                <!-- Modal -->
     <div class="modal-overlay" id="purchaseModal">
        <div class="modal-box">
            <div class="modal-header">
            <h2>Confirm Purchase</h2>
            <span class="close-icon" id="closeModal">&times;</span>
            </div>

            <p class="modal-text">Are you sure you want to complete your order?</p>

            <div class="modal-buttons">
                <button class="close-btn" id="closeModalBtn">Close</button>
                <button class="confirm-btn" id="confirmOrder">Confirm</button>
            </div>
        </div>
    </div>
    <footer class="footer">
        <p> ©️ 2026 Unistore | All Rights Reserved </p>
        <a href="mailto:unistore@gmail.com"> Contact Us </a>
    </footer>
    <script>

    document.addEventListener("DOMContentLoaded", function() {

        let cartBox = document.getElementById("cartBox");
        let summaryItems = document.getElementById("summaryItems");
        let totalPrice = document.getElementById("totalPrice");

        let openModal1 = document.getElementById("openModal");
        let purchaseModal = document.getElementById("purchaseModal");
        let closeModal = document.getElementById("closeModal");
        let closeModalBtn = document.getElementById("closeModalBtn");
        let confirmBtn = document.getElementById("confirmOrder");

        function getDetailsPage(name) {
            if (name === "English Book") return "englishbook.html";
            if (name === "Programming Book") return "programmingbook.html";
            if (name === "Physics Book") return "physicsbook.html";
            if (name === "Calculator") return "calculator.html";
            if (name === "Stapler") return "stapler.html";
            if (name === "Pen Set") return "penset.html";
            if (name === "Headphones") return "headphones.html";
            if (name === "Used iPad") return "usedipad.html";
            if (name === "Used Laptop") return "usedlaptop.html";


            return "#";
        }

        function displayCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            cartBox.innerHTML = "";
            summaryItems.innerHTML = "";

            let total = 0;

            if (cart.length === 0) {
                cartBox.innerHTML = "<p>Your cart is empty.</p>";
                totalPrice.textContent = "Total: 0 SAR";
                return;
            }

            cart.forEach(function(item, index) {
                let price = Number(item.price);
                total += price;
                
                cartBox.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <p class="item-price">Price: ${item.price} SAR</p>

                            <div class="item-buttons">
                                <a href="${getDetailsPage(item.name)}" class="details-btn">View Details</a>
                                <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
                            </div>

                        </div>
                    </div>  
                `;
                summaryItems.innerHTML += `<p>${item.name} - ${item.price} SAR</p>`;  
            });

            totalPrice.textContent = "Total: " + total + " SAR";
        }

        window.removeItem = function(index) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            displayCart();
        };

        openModal1.addEventListener("click", function() {

            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let isLoggedIn = localStorage.getItem("isLoggedIn");

            if (cart.length === 0) {
                alert("Your cart is empty, please add items to your cart before proceeding to purchase.");
                 window.location.href = "browse items.html";
                return;
            }

            if (isLoggedIn !== "true") {
                alert("Please log in to complete your purchase.");
                 window.location.href = "login.html";

                return;
            }

            purchaseModal.style.display = "flex";
        });

        closeModal.addEventListener("click", function() {
            purchaseModal.style.display = "none";
        });

        closeModalBtn.addEventListener("click", function() {
            purchaseModal.style.display = "none";
        });

        confirmBtn.addEventListener("click", function() {

            purchaseModal.style.display = "none";

            setTimeout(function() {
            alert("Your order has been confirmed successfully!");
                window.location.href = "checkout.html";
                
        }, 100);        

    }); 

        displayCart();
    });
let menuIcon = document.querySelector(".menu-icon");
let sideMenu = document.querySelector(".menu-side");
let overlay = document.querySelector(".overlay");
let searchButton = document.querySelector(".search-btn");

menuIcon.addEventListener("click",function(){
if (sideMenu.style.right ==="0px"){
    sideMenu.style.right = "-250px";
    overlay.style.display= "none";}
else {
    sideMenu.style.right ="0px";
    overlay.style.display= "block";}
});

    overlay.addEventListener("click",function(){
    sideMenu.style.right ="-250px";
    overlay.style.display= "none";});

        




</script>
</body>
</html>
