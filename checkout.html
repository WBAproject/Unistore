<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" href="checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
   <!-- Header-->
          <header class="top-header">

        <div class="header-top">

            <a href="index.html" class="logo-box">
            <img src="https://png.pngtree.com/template/20190316/ourmid/pngtree-books-logo-image_79143.jpg" alt="Unistore Logo">
            <h1>Unistore</h1>
            </a>

    <nav class="navbar">
        <a href="index.html">HOME</a>
        <a href="Browse Items.html">Browse Items</a>
        <a href="cart.html">Cart</a>
        <a href="add new item-page.html">Sell - Rent</a>
        <a href="support.html">Support</a>
        <a href="mailto:unistore@gmail.com">Contact Us | EMAIL</a>
    </nav>

        <div id="user-profile">
            <span>Welcome!</span>

            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJZ5Jv_tCYyoloVKtYTLbvqs_k_cKw-jJczg&s" alt="User Profile">

            <button id="logout-btn" class="logout-btn">
                Logout
            </button>

        </div>
    </div>

</div>

</header>

    
        
    <main class="content"> 
     <form id="checkoutForm" novalidate>
        <section class="form-group">
            <h2 class="section-title">Buyer Information</h2>
              <div class="input-wrapper">
                 <div class="input-container">
                     <label for="user-name">Name</label>
                     <input type="text" id="user-name" placeholder="Enter your full name" required>
                     <span id="nameError" class="name-error"></span>
                </div>
            </div>
            <div class="input-wrapper">
                <div class="input-container">
                    <label for="user-phone">Phone</label>
                    <input id="user-phone" type="tel" placeholder="05XXXXXXXX" required>
                    <span id="phoneError" class="phone-error"></span>
                </div>
            </div>
        </section>
        <section class="form-group">
            <h2 class="section-title">Preferred Meeting / Delivery Method</h2>
            <label class="radio-option">
                <input type="radio" name="delivery" checked>
                Delivery by agreement
            </label>
            <label class="radio-option">
                <input type="radio" name="delivery">
                Pickup from seller
            </label>
        </section>
        <section class="form-group">
            <h2 class="section-title">Payment Method</h2>
            <label class="radio-option">
                <input type="radio" name="payment" checked>
                Bank transfer
            </label>
            <label class="radio-option">
                <input type="radio" name="payment" checked>
                Cash on meetup
            </label>
        </section>

        <hr class="divider">

        <section class="order-summary">
            <h2 class="section-title">Order Summary</h2>

            <div class="total-text">
               <span>Total :</span> 
                <span id="totalAmount">0 SAR</span>
            </div>
            <button type="submit" id="btn">Send Order Request</button>
       </section>
     </form>
    </main>
  </div>

  <footer class="footer">
    <p> ©️ 2026 Unistore | All Rights Reserved </p>
    <a href="mailto:unistore@gmail.com"> Contact Us </a>
</footer>

 <script>
    function updateTotal() {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    let totalAmount = cart.reduce((total, item) => {
        return total + Number(item.price);
    }, 0);

    document.getElementById('totalAmount').textContent = totalAmount + ' SAR';
}

updateTotal();

    document.getElementById('checkoutForm').addEventListener('submit', function(event) {
        event.preventDefault();
        

        let name = document.getElementById("user-name").value.trim();
        let phone = document.getElementById("user-phone").value.trim();


        document.getElementById("nameError").textContent = "";
        document.getElementById("phoneError").textContent = "";

        document.getElementById("user-name").classList.remove("input-error");
        document.getElementById("user-phone").classList.remove("input-error");

        let isValid = true;

        if(name ===""){
            document.getElementById("nameError").textContent = "Name is required."; 
            document.getElementById("user-name").classList.add("input-error");
            isValid = false;
        }

        if( !/^05[0-9]{8}$/.test(phone)){
            document.getElementById("phoneError").textContent = "Enter a valid phone number starting with 05 and containing 10 digits.";
            document.getElementById("user-phone").classList.add("input-error");
            isValid = false;
        }

        if (!isValid) {
            return;
        }

        alert("Your order request has been sent successfully!");
        localStorage.removeItem("cart");
        window.location.href = "index.html";
    });

    let menuIcon = document.querySelector(".menu-icon");
let sideMenu = document.querySelector(".menu-side");
let overlay = document.querySelector(".overlay");
let searchButton = document.querySelector(".search-btn");

menuIcon.addEventListener("click",function(){
if (sideMenu.style.right ==="0px"){
    sideMenu.style.right = "-250px";
    overlay.style.display= "none";}
else {
    sideMenu.style.right ="0px";
    overlay.style.display= "block";}
});

    overlay.addEventListener("click",function(){
    sideMenu.style.right ="-250px";
    overlay.style.display= "none";});

;

    window.addEventListener('DOMContentLoaded', () => {
const isLoggedIn = localStorage.getItem("isLoggedIn");
const loginBtn = document.getElementById("login-btn");
const userIcon = document.getElementById("user-profile");
if (isLoggedIn === "true") {
if (loginBtn) loginBtn.style.display = "none";
if (userIcon) userIcon.style.display = "flex";}
else {
if (loginBtn) loginBtn.style.display = "block";
if (userIcon) userIcon.style.display = "none";}
});

const logoutBtn = document.getElementById('logout-btn');

if (logoutBtn) {
logoutBtn.addEventListener('click', function() {
localStorage.removeItem('isLoggedIn');
window.location.reload();
});
}

</script>

</body>
</html>
