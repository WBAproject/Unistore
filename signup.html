<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Unistore</title>
    <link rel="stylesheet" href="stylehome.css">
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
       <div class="right-side">
            <div class="menu-icon">☰</div>
       </div>
<main class="container">
   <header class="logo-box">
            <img src="https://png.pngtree.com/template/20190316/ourmid/pngtree-books-logo-image_79143.jpg" alt="Unistore Logo">
            <h1>Unistore</h1>
   </header>
    <div class="overlay"></div>

     <div class="menu-side" id="menuside">
        <a href="login.html">Login / Sign Up</a>
        <a href="index.html">HOME</a>
        <a href="Browse Items.html">Browse Items</a>
        <a href="cart.html">Cart</a>
        <a href="add new item-page.html">Sell / Rent </a>
        <a href="support-page.html">Support</a> 
        <a href="mailto:unistore@gmail.com">Contact Us | EMAIL </a>
     </div>
   <section class="form-box">
       <a href="index.html">
           <p id="home-back">Back to Home </p>
       </a>
     <h2>Sign Up</h2>
     <form id="signupForm">

        <label for="name">Full name</label>
          <input id="name" type="text" placeholder="Enter your name">
          <span id="nameError" class="error-msg"></span>

        <label for="phone">Phone number</label>
          <input id="phone" type="text" placeholder="+996">
          <span id="phoneError" class="error-msg"></span>

        <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email">
          <span id="emailError" class="error-msg"></span>


        <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password">
          <span id="passwordError" class="error-msg"></span>

        <fieldset class="role-selection">
           <legend id="question">Are you?</legend>
           <label class="radio-option">
                <input type="radio" name="userRole" value="buyer" checked>
                Buyer
           </label>
           <label class="radio-option">
                <input type="radio" name="userRole" value="seller">
                Seller
           </label>
        </fieldset>
         <button id="btn">Sign Up</button>
     </form>
     <p class="text">Have an account?
       <a id="login" href="login.html">Login</a>
     </p>
   </section>

</main>
<script src="home.js"></script>
<script src="signup.js"></script>
</body>
</html>
