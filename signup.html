<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Unistore</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<main class="container">
    <header class="top-header">
        <div  class="header-top">
         <a href="index.html" class="logo-box">
            <img src="https://png.pngtree.com/template/20190316/ourmid/pngtree-books-logo-image_79143.jpg" alt="Unistore Logo">
            <h1>Unistore</h1>
         </a>
          <nav class="navbar" >
            <a href="cart.html">Cart</a>
            <a href="index.html">Home</a>
            <a href="Browse Items.html">Browse Items</a>
            <a href="add new item-page.html">Sell - Rent </a>
            <a href="#about">About Us</a>
            <a href="mailto:unistore@gmail.com">Contact Us </a>
          </nav>
        </div>
    </header>
   <section class="form-box">
       <a href="index.html">
           <p id="home-back">Back to Home </p>
       </a>
     <h2>Sign Up</h2>
     <form id="signupForm">

        <label for="name">Full name</label>
          <input id="name" type="text" placeholder="Enter your name" autocomplete="name">
          <span id="nameError" class="error-msg"></span>

        <label for="phone">Phone number</label>
          <input id="phone" type="text" placeholder="+996" autocomplete="tel">
          <span id="phoneError" class="error-msg"></span>

        <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email" autocomplete="email">
          <span id="emailError" class="error-msg"></span>


        <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" autocomplete="new-password">
          <span id="passwordError" class="error-msg"></span>

        <fieldset class="role-selection">
           <legend id="question">Are you?</legend>
           <label class="radio-option">
                <input type="radio" name="userRole" value="buyer" checked>
                Buyer
           </label>
           <label class="radio-option">
                <input type="radio" name="userRole" value="seller">
                Seller
           </label>
        </fieldset>
         <button id="btn">Sign Up</button>
     </form>
     <p class="text">Have an account?
       <a id="login" href="login.html">Login</a>
     </p>
   </section>

</main>
    <footer class="footer">
        <p> ©️ 2026 Unistore | All Rights Reserved </p>
        <a href="mailto:unistore@gmail.com"> Contact Us </a>
    </footer>
<script src="signup.js"></script>
</body>
</html>
