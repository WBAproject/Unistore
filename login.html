<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Unistore</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<main class="container">
    <header class="top-header">
        <div  class="header-top">
          <a href="index.html" class="logo-box">
            <img src="https://png.pngtree.com/template/20190316/ourmid/pngtree-books-logo-image_79143.jpg" alt="Unistore Logo">
            <h1>Unistore</h1>
          </a>
          <nav class="navbar" >
            <a href="cart.html">Cart</a>
            <a href="index.html">Home</a>
            <a href="Browse Items.html">Browse Items</a>
            <a href="add new item-page.html">Sell - Rent </a>
            <a href="#about">About Us</a>
            <a href="support-page.html"</a>  
            <a href="mailto:unistore@gmail.com">Contact Us </a>
         </nav>
        </div>
    </header>
   <section class="form-box">
           <a id="back-home" href="index.html">
           <p>Back to Home </p>
           </a>
     <h2>Login</h2>
     <form id="loginForm">

        <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email" autocomplete="email">
          <span id="emailError" class="error-msg"></span>


        <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" autocomplete="current-password">
          <span id="passwordError" class="error-msg"></span>

       <label class="checkbox-option">
                <input type="checkbox" name="option">
                Remember me
       </label>

      <button id="btn">Login</button>
     </form>
     <p class="text">Don't have an account?
       <a id="sign-up" href="signup.html">Sign up</a>
     </p>
   </section>
</main>
  <footer class="footer">
        <p> ©️ 2026 Unistore | All Rights Reserved </p>
        <a href="mailto:unistore@gmail.com"> Contact Us </a>
  </footer>

<script src="login.js"> </script>
</body>
</html>
