<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Unistore</title>
    <link rel="stylesheet" href="stylehome.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
       <div class="right-side">
            <div class="menu-icon">☰</div>
       </div>
<main class="container">
   <header class="logo-box">
            <img src="https://png.pngtree.com/template/20190316/ourmid/pngtree-books-logo-image_79143.jpg" alt="Unistore Logo">
            <h1>Unistore</h1>
   </header>
    <div class="overlay"></div>

     <div class="menu-side" id="menuside">
        <a href="login.html">Login / Sign Up</a>
        <a href="index.html">HOME</a>
        <a href="Browse Items.html">Browse Items</a>
        <a href="cart.html">Cart</a>
        <a href="add new item-page.html">Sell / Rent </a>
        <a href="mailto:unistore@gmail.com">Contact Us | EMAIL </a>
     </div>
   <section class="form-box">
           <a id="back-home" href="index.html">
           <p>Back to Home </p>
           </a>
     <h2>Login</h2>
     <form id="loginForm">

        <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email">
          <span id="emailError" class="error-msg"></span>


        <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password">
          <span id="passwordError" class="error-msg"></span>

       <label class="checkbox-option">
                <input type="checkbox" name="option" checked>
                Remember me
       </label>

      <button id="btn">Login</button>
     </form>
     <p class="text">Don't have an account?
       <a id="sign-up" href="signup.html">Sign up</a>
     </p>
   </section>
</main>
<script src="home.js"></script>    
<script src="login.js"> </script>
</body>
</html>
