<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.cs">
</head>
<body>
<div class="container">
   <div class="logo-box">
            <img src="https://png.pngtree.com/template/20190316/ourmid/pngtree-books-logo-image_79143.jpg" alt="Unistore Logo">
            <h1>Unistore</h1>

   </div>
   <div class="form-box">
           <a href="Home-page.html">
           <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="home icon" class="home-icon">
           </a>
     <h2>Login</h2>
     <form id="loginForm">

        <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email">


        <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password">

       <label class="checkbox-option">
                <input type="checkbox" name="option" checked>
                Remember me
       </label>

    <button id="btn">Login</button>
     </form>
     <p class="text">Don't have an account?
     <a href="http://localhost:63342/signup.html/signup.html?_ijt=9oivfaitnvoagcmnftiq2d6s4m&_ij_reload=RELOAD_ON_SAVE">Sign up</a>
     </p>
   </div>

</div>
<script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault();
      alert("Login successful!")
      window.location.href = "Home-page.html";
      });
</script>
</body>
</html>
